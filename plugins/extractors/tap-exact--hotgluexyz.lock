{
  "plugin_type": "extractors",
  "name": "tap-exact",
  "namespace": "tap_exact",
  "variant": "hotgluexyz",
  "label": "Exact",
  "docs": "https://www.matatika.com/data-details/tap-exact/",
  "repo": "https://gitlab.com/hotglue/tap-exact",
  "pip_url": "git+https://gitlab.com/hotglue/tap-exact.git",
  "executable": "tap-exact",
  "description": "Exact is a software company that provides business management solutions for small and medium-sized enterprises.\n\nExact offers a range of software solutions that help businesses manage their finances, operations, and customer relationships. Their products include accounting software, ERP systems, CRM tools, and more. With Exact, businesses can streamline their processes, improve their efficiency, and gain better insights into their operations. The company also offers cloud-based solutions that allow users to access their data from anywhere, at any time. Overall, Exact provides a comprehensive suite of tools that help businesses run more smoothly and effectively.",
  "logo_url": "/assets/logos/extractors/exact.svg",
  "capabilities": [
    "discover",
    "state",
    "catalog"
  ],
  "settings": [
    {
      "name": "access_token",
      "kind": "string",
      "label": "Access Token",
      "description": "A token that grants access to the Exact API for a specific user and application.",
      "hidden": false,
      "sensitive": true,
      "configured": false,
      "protected": false
    },
    {
      "name": "refresh_token",
      "kind": "string",
      "label": "Refresh Token",
      "description": "A token that can be used to obtain a new access token when the current one expires.",
      "hidden": false,
      "sensitive": true,
      "configured": false,
      "protected": false
    },
    {
      "name": "client_id",
      "kind": "string",
      "label": "Client ID",
      "description": "A unique identifier for the application that is registered with the Exact API.",
      "hidden": false,
      "sensitive": true,
      "configured": false,
      "protected": false
    },
    {
      "name": "client_secret",
      "kind": "string",
      "label": "Client Secret",
      "description": "A secret key that is used to authenticate the application when requesting access tokens.",
      "hidden": false,
      "sensitive": true,
      "configured": false,
      "protected": false
    },
    {
      "name": "current_division",
      "kind": "string",
      "label": "Current Division",
      "description": "The division within the Exact system that the API requests will be made for.",
      "hidden": false,
      "sensitive": false,
      "configured": false,
      "protected": false
    }
  ]
}
